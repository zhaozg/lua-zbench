name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os.name }}, ${{ matrix.zig_version }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: ubuntu-latest,   runner: ubuntu-latest }
          - { name: macos-latest,    runner: macos-latest }
          - { name: windows-latest,  runner: windows-latest }
        zig_version:
          - "0.16.0"

    runs-on: ${{ matrix.os.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig_version }}

      # Create Zig cache directories and set TMPDIR to avoid "failed to create temporary zip file" errors
      - name: Prepare Zig cache (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p .zig-cache/tmp
          echo "TMPDIR=$PWD/.zig-cache/tmp" >> $GITHUB_ENV

      - name: Prepare Zig cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".zig-cache\tmp" | Out-Null
          $tmpDir = (Resolve-Path ".zig-cache\tmp").Path
          echo "TMPDIR=$tmpDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install LuaJIT (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luajit libluajit-5.1-dev

      - name: Install LuaJIT (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install luajit

      - name: Install LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # No system LuaJIT needed on Windows!
          # ziglua compiles LuaJIT from source using zig, so zig build and zig build test work fine.
          echo "LuaJIT is compiled by ziglua from source - no system LuaJIT needed on Windows"

      - name: Verify LuaJIT
        if: runner.os != 'Windows'
        run: |
          luajit -v
          luajit -e "print('LuaJIT works!')"

      - name: Verify LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          echo "LuaJIT is compiled by ziglua - verification done during zig build"

      - name: Build shared library
        run: |
          zig build -Doptimize=ReleaseSafe

      - name: Run Zig tests
        run: |
          zig build test

      - name: Run Lua examples (Unix)
        if: runner.os != 'Windows'
        run: |
          luajit -e "package.path = './src/?.lua;' .. (package.path or ''); package.cpath = './zig-out/lib/?.so;./zig-out/lib/?.dylib;' .. (package.cpath or '')" examples/basic.lua
          luajit -e "package.path = './src/?.lua;' .. (package.path or ''); package.cpath = './zig-out/lib/?.so;./zig-out/lib/?.dylib;' .. (package.cpath or '')" examples/fibonacci.lua

      - name: Run Lua examples (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # On Windows, use zig build to run examples instead of system luajit
          # (ziglua provides the LuaJIT runtime)
          echo "Lua examples on Windows: use zig build run-examples (TODO)"

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libzbench-${{ matrix.os.name }}-zig${{ matrix.zig_version }}
          path: zig-out/lib/
          retention-days: 7
