name: CI

on:
  push:
    branches: [main, master]
    paths-ignore:
      - '**.md'
      - 'docs/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Test (${{ matrix.os.name }}, ${{ matrix.zig_version }})
    strategy:
      fail-fast: false
      matrix:
        os:
          - { name: ubuntu-latest,   runner: ubuntu-latest }
          - { name: macos-latest,    runner: macos-latest }
          - { name: windows-latest,  runner: windows-latest }
        zig_version:
          - "0.16.0"

    runs-on: ${{ matrix.os.runner }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Zig
        uses: mlugg/setup-zig@v2
        with:
          version: ${{ matrix.zig_version }}

      # Create Zig cache directories and set TMPDIR to avoid "failed to create temporary zip file" errors
      - name: Prepare Zig cache (Unix)
        if: runner.os != 'Windows'
        run: |
          mkdir -p .zig-cache/tmp
          echo "TMPDIR=$PWD/.zig-cache/tmp" >> $GITHUB_ENV

      - name: Prepare Zig cache (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ".zig-cache\tmp" | Out-Null
          $tmpDir = (Resolve-Path ".zig-cache\tmp").Path
          echo "TMPDIR=$tmpDir" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Install LuaJIT (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq luajit libluajit-5.1-dev

      - name: Install LuaJIT (macOS)
        if: runner.os == 'macOS'
        run: |
          brew install luajit

      - name: Install LuaJIT (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          # Download pre-built LuaJIT for Windows from MSYS2
          $ARCHIVE_URL = "https://github.com/msys2/MINGW-packages/releases/download/mingw-w64-luajit"
          $TEMP_DIR = "$env:RUNNER_TEMP\luajit"
          New-Item -ItemType Directory -Force -Path $TEMP_DIR | Out-Null
          $ARCHIVE = "$env:RUNNER_TEMP\luajit.tar.zst"
          # Try to download from msys2
          try {
            # Use curl to download the MSYS2 luajit package
            curl -sL -o $ARCHIVE "https://repo.msys2.org/mingw/ucrt64/mingw-w64-ucrt-x86_64-luajit-2.1.1774896198-1-any.pkg.tar.zst"
            tar -xaf $ARCHIVE -C $TEMP_DIR
            echo "$TEMP_DIR\ucrt64\bin" | Out-File -FilePath $env:GITHUB_PATH -Append
          } catch {
            Write-Warning "MSYS2 download failed, trying alternative..."
            # Alternative: use vcpkg
            & vcpkg install luajit --triplet x64-windows --quiet
            $vcpkgDir = "$env:VCPKG_INSTALLATION_ROOT\installed\x64-windows\bin"
            if (Test-Path $vcpkgDir) {
              echo "$vcpkgDir" | Out-File -FilePath $env:GITHUB_PATH -Append
            }
          }

      - name: Verify LuaJIT
        run: |
          luajit -v
          luajit -e "print('LuaJIT works!')"

      - name: Build shared library
        run: |
          zig build -Doptimize=ReleaseSafe

      - name: Run Zig tests
        run: |
          zig build test

      - name: Run Lua examples (basic)
        run: |
          luajit -e "package.cpath = './zig-out/lib/?.so;./zig-out/lib/?.dylib;' .. (package.cpath or '')" examples/basic.lua

      - name: Run Lua examples (fibonacci)
        run: |
          luajit -e "package.cpath = './zig-out/lib/?.so;./zig-out/lib/?.dylib;' .. (package.cpath or '')" examples/fibonacci.lua

      - name: Upload build artifacts
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: libzbench-${{ matrix.os.name }}-zig${{ matrix.zig_version }}
          path: zig-out/lib/
          retention-days: 7
